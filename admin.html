<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin | SRE Wire Shop</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.5/JsBarcode.all.min.js"></script>

  <style>
    :root {
      --bg: #0f1117; --surface: #1a1d27; --surface2: #20232f;
      --border: #2a2d3a; --accent: #f0b429; --text: #e8eaf0;
      --muted: #6b7080; --danger: #f87171;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Sarabun', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: linear-gradient(rgba(240,180,41,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(240,180,41,0.025) 1px, transparent 1px);
      background-size: 40px 40px; pointer-events: none;
    }
    /* LOGIN */
    #login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; position: relative; z-index: 1; }
    .login-card { width: 100%; max-width: 380px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 40px 32px; }
    .login-logo { text-align: center; margin-bottom: 32px; }
    .login-logo-text { font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 600; letter-spacing: 4px; color: var(--accent); text-transform: uppercase; }
    .login-subtitle { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 12px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
    .field input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; color: var(--text); font-family: 'Sarabun', sans-serif; font-size: 15px; outline: none; transition: border-color 0.2s; }
    .field input:focus { border-color: var(--accent); }
    .login-btn { width: 100%; background: var(--accent); color: #0f1117; border: none; border-radius: 10px; padding: 14px; font-family: 'Sarabun', sans-serif; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 8px; }
    .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .login-error { color: var(--danger); font-size: 13px; text-align: center; margin-top: 12px; min-height: 20px; }
    /* ADMIN */
    #admin-screen { display: none; flex-direction: column; min-height: 100vh; position: relative; z-index: 1; }
    .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
    .topbar-logo { font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 600; color: var(--accent); letter-spacing: 2px; }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    #user-email { font-size: 12px; color: var(--muted); }
    .logout-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); border-radius: 8px; padding: 6px 14px; font-family: 'Sarabun', sans-serif; font-size: 13px; cursor: pointer; }
    .logout-btn:hover { border-color: var(--danger); color: var(--danger); }
    .admin-body { flex: 1; padding: 24px; max-width: 800px; width: 100%; margin: 0 auto; }
    .search-input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 18px; color: var(--text); font-family: 'Sarabun', sans-serif; font-size: 15px; outline: none; transition: border-color 0.2s; margin-bottom: 20px; display: block; }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--muted); }
    #product-list { display: flex; flex-direction: column; gap: 8px; }
    .product-row { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: all 0.15s; }
    .product-row:hover { border-color: var(--accent); background: var(--surface2); }
    .product-info { flex: 1; min-width: 0; }
    .p-name { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .p-barcode { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); margin-top: 3px; }
    .p-price { font-family: 'IBM Plex Mono', monospace; font-size: 16px; font-weight: 600; color: var(--accent); flex-shrink: 0; }
    .p-icon { font-size: 20px; color: var(--muted); flex-shrink: 0; }
    .loading-msg { text-align: center; color: var(--muted); padding: 40px; font-size: 15px; }
    .loading-msg.error { color: var(--danger); }

    /* OVERLAY */
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; z-index: 100; padding: 24px; backdrop-filter: blur(4px); }
    .modal-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; width: 100%; max-width: 360px; overflow: hidden; animation: popIn 0.2s ease both; }
    @keyframes popIn { from { opacity:0; transform:scale(0.9); } to { opacity:1; transform:scale(1); } }
    .modal-header { padding: 20px 24px 0; display: flex; justify-content: space-between; align-items: center; }
    .modal-title { font-size: 14px; font-weight: 600; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
    .close-btn { background: none; border: none; color: var(--muted); font-size: 22px; cursor: pointer; line-height: 1; }
    .modal-body { padding: 20px 24px; text-align: center; }
    .modal-actions { display: flex; gap: 10px; padding: 0 24px 24px; }
    .btn-primary { flex: 1; background: var(--accent); color: #0f1117; border: none; border-radius: 10px; padding: 13px; font-family: 'Sarabun', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; }
    .btn-secondary { flex: 1; background: transparent; color: var(--muted); border: 1px solid var(--border); border-radius: 10px; padding: 13px; font-family: 'Sarabun', sans-serif; font-size: 15px; cursor: pointer; }
    .btn-secondary:hover { border-color: var(--text); color: var(--text); }

    /* CHOOSE MODAL */
    #choose-modal .choose-btns { display: flex; gap: 12px; padding: 16px 24px 24px; }
    .choose-btn { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 14px; padding: 20px 12px; cursor: pointer; transition: all 0.15s; text-align: center; }
    .choose-btn:hover { border-color: var(--accent); }
    .choose-btn .icon { font-size: 32px; margin-bottom: 8px; }
    .choose-btn .label { font-size: 14px; font-weight: 600; color: var(--text); }
    .choose-btn .sublabel { font-size: 11px; color: var(--muted); margin-top: 4px; }
    #choose-product-name { font-size: 15px; font-weight: 600; padding: 16px 24px 0; line-height: 1.4; }
    #choose-product-barcode { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--muted); padding: 4px 24px 0; }

    /* QR MODAL */
    #qr-canvas { display: flex; justify-content: center; margin-bottom: 16px; background: #fff; border-radius: 12px; padding: 16px; }
    #qr-product-name { font-size: 16px; font-weight: 700; margin-bottom: 4px; line-height: 1.4; }
    #qr-product-barcode { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--muted); margin-bottom: 8px; }
    #qr-product-price { font-family: 'IBM Plex Mono', monospace; font-size: 28px; font-weight: 600; color: var(--accent); margin-bottom: 4px; }
    #qr-url { font-size: 10px; color: var(--muted); word-break: break-all; margin-bottom: 16px; }

    /* BARCODE MODAL */
    #bc-canvas { display: flex; justify-content: center; margin-bottom: 16px; background: #fff; border-radius: 12px; padding: 16px 8px; }
    #bc-canvas svg { max-width: 100%; }
    #bc-product-name { font-size: 16px; font-weight: 700; margin-bottom: 4px; line-height: 1.4; }
    #bc-product-price { font-family: 'IBM Plex Mono', monospace; font-size: 28px; font-weight: 600; color: var(--accent); margin-bottom: 12px; }
    .size-row { display: flex; flex-direction: column; align-items: center; gap: 6px; margin-bottom: 4px; }
    .size-label { font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
    .size-inputs { display: flex; align-items: center; gap: 6px; }
    .size-inputs input { width: 56px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 6px 8px; color: var(--text); font-family: 'IBM Plex Mono', monospace; font-size: 14px; text-align: center; outline: none; }
    .size-inputs input:focus { border-color: var(--accent); }
    .size-unit { font-size: 12px; color: var(--muted); }
    .check-label { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--muted); cursor: pointer; }
    .check-label input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; }
  </style>
</head>
<body>

    </div>

<!-- CHOOSE MODAL -->

  <div class="modal-card">

      </div>
      <div class="choose-btn" id="choose-bc">
        <div class="icon">Ō¢«Ō¢»Ō¢«Ō¢»Ō¢«</div>

        <div class="sublabel">ÓĖ¬Ó╣üÓĖüÓĖÖÓĖöÓ╣ēÓĖ¦ÓĖóÓ╣ĆÓĖäÓĖŻÓĖĘÓ╣łÓĖŁÓĖćÓĖŁÓ╣łÓĖ▓ÓĖÖ</div>
      </div>

</div>

<!-- QR MODAL -->

  <div class="modal-card">
    <div class="modal-header">
      <div class="modal-title">QR Code</div>
      <button class="close-btn" id="qr-close">├Ś</button>
    </div>
    <div class="modal-body">
      <div id="qr-canvas"></div>
      <div id="qr-product-name"></div>

      <button class="btn-primary" id="qr-print-btn">­¤¢©’ĖÅ ÓĖøÓĖŻÓĖ┤Ó╣ēÓĖÖ QR</button>

        </label>
        <input id="p2-preview" type="text" style="display:none;margin-top:6px;font-family:monospace;font-size:15px;font-weight:700;color:#111;background:#fff;border:1px solid #ccc;border-radius:8px;padding:6px 12px;letter-spacing:3px;text-align:center;width:100%;outline:none;">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBLWpPcpu3hgQRCsPNbQnEIqOwbtnkjUQE",
    authDomain: "claude-8151c.firebaseapp.com",
    databaseURL: "https://claude-8151c-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "claude-8151c",
    storageBucket: "claude-8151c.firebasestorage.app",
    messagingSenderId: "613224139677",
    appId: "1:613224139677:web:d8e4b6cd547209e0133d74"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  const JSON_URL = 'https://raw.githubusercontent.com/namoonam/searchpricesre/main/products_data.json';
  const PUBLIC_URL = 'https://namoonam.github.io/searchpricesre/';

  let allProducts = [];
  let currentProduct = null;

  // Auth state
  onAuthStateChanged(auth, (user) => {
    if (user) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('admin-screen').style.display = 'flex';
      document.getElementById('user-email').textContent = user.email;
      loadProducts();
    } else {
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('admin-screen').style.display = 'none';
    }
  });

  // Login
  async function doLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('login-btn');
    const err = document.getElementById('login-error');
    err.textContent = '';
    btn.disabled = true;
    btn.textContent = 'ÓĖüÓĖ│ÓĖźÓĖ▒ÓĖćÓ╣ĆÓĖéÓ╣ēÓĖ▓ÓĖ¬ÓĖ╣Ó╣łÓĖŻÓĖ░ÓĖÜÓĖÜ...';
    try {
      await signInWithEmailAndPassword(auth, email, password);
    } catch (e) {
      err.textContent = 'ÓĖŁÓĖĄÓ╣ĆÓĖĪÓĖźÓĖ½ÓĖŻÓĖĘÓĖŁÓĖŻÓĖ½ÓĖ▒ÓĖ¬ÓĖ£Ó╣łÓĖ▓ÓĖÖÓ╣äÓĖĪÓ╣łÓĖ¢ÓĖ╣ÓĖüÓĖĢÓ╣ēÓĖŁÓĖć';
      btn.disabled = false;
      btn.textContent = 'Ó╣ĆÓĖéÓ╣ēÓĖ▓ÓĖ¬ÓĖ╣Ó╣łÓĖŻÓĖ░ÓĖÜÓĖÜ';
    }
  }

  // Load products
  async function loadProducts() {
    const list = document.getElementById('product-list');
    list.innerHTML = '<div class="loading-msg">ÓĖüÓĖ│ÓĖźÓĖ▒ÓĖćÓ╣éÓĖ½ÓĖźÓĖöÓĖ¬ÓĖ┤ÓĖÖÓĖäÓ╣ēÓĖ▓...</div>';
    try {
      const res = await fetch(`${JSON_URL}?t=${Date.now()}`);
      allProducts = await res.json();
      renderList(allProducts);
    } catch (e) {
      list.innerHTML = '<div class="loading-msg error">Ó╣éÓĖ½ÓĖźÓĖöÓĖéÓ╣ēÓĖŁÓĖĪÓĖ╣ÓĖźÓ╣äÓĖĪÓ╣łÓĖ¬ÓĖ│Ó╣ĆÓĖŻÓ╣ćÓĖł</div>';
    }
  }

  function renderList(products) {
    const list = document.getElementById('product-list');
    if (products.length === 0) {
      list.innerHTML = '<div class="loading-msg">Ó╣äÓĖĪÓ╣łÓĖ×ÓĖÜÓĖ¬ÓĖ┤ÓĖÖÓĖäÓ╣ēÓĖ▓</div>';
      return;
    }
    list.innerHTML = products.slice(0, 300).map(p => `
      <div class="product-row" data-barcode="${p.barcode}" data-name="${encodeURIComponent(p.name)}" data-price="${p.p1}" data-cost="${p.cost || 0}" data-p2="${p.p2 || 0}">
        <div class="product-info">
          <div class="p-name">${p.name}</div>
          <div class="p-barcode">${p.barcode}</div>
        </div>
        <div class="p-price">ÓĖ┐${Number(p.p1).toLocaleString('th-TH')}</div>
        <div class="p-icon">ŌŖ×</div>
      </div>
    `).join('');

    list.querySelectorAll('.product-row').forEach(row => {
      row.addEventListener('click', () => showChoose(
        row.dataset.barcode,
        decodeURIComponent(row.dataset.name),
        row.dataset.price,
        row.dataset.cost,
        row.dataset.p2
      ));
    });
  }

  // Search
  function doSearch() {
    const q = document.getElementById('search-input').value.trim().toLowerCase();
    if (!q) { renderList(allProducts); return; }
    renderList(allProducts.filter(p =>
      p.name.toLowerCase().includes(q) || p.barcode.includes(q)
    ));
  }

  // Show choose modal
  function showChoose(barcode, name, price, cost, p2) {
    currentProduct = { barcode, name, price, cost, p2 };
    document.getElementById('choose-product-name').textContent = name;
    document.getElementById('choose-product-barcode').textContent = barcode;
    document.getElementById('choose-modal').style.display = 'flex';
  }

  // Show QR
  function showQR() {
    document.getElementById('choose-modal').style.display = 'none';
    const { barcode, name, price } = currentProduct;
    const url = `${PUBLIC_URL}?barcode=${barcode}`;
    document.getElementById('qr-product-name').textContent = name;
    document.getElementById('qr-product-barcode').textContent = barcode;
    document.getElementById('qr-product-price').textContent = `ÓĖ┐${Number(price).toLocaleString('th-TH')}`;
    document.getElementById('qr-url').textContent = url;

    const qrContainer = document.getElementById('qr-canvas');
    qrContainer.innerHTML = '';
    new QRCode(qrContainer, {
      text: url, width: 200, height: 200,
      colorDark: '#0f1117', colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.H
    });
    document.getElementById('qr-modal').style.display = 'flex';
  }

  // Show Barcode
  function showBarcode() {
    document.getElementById('choose-modal').style.display = 'none';
    const { barcode, name, price } = currentProduct;
    document.getElementById('bc-product-name').textContent = name;
    document.getElementById('bc-product-price').textContent = `ÓĖ┐${Number(price).toLocaleString('th-TH')}`;
    document.getElementById('p2-preview').value = encodeCost(currentProduct.p2 || '0');

    try {
      JsBarcode('#bc-svg', barcode, {
        format: 'CODE128',
        width: 2, height: 80,
        displayValue: true,
        fontSize: 14,
        margin: 10,
        background: '#ffffff',
        lineColor: '#000000'
      });
    } catch(e) {
      document.getElementById('bc-canvas').innerHTML = '<div style="color:var(--danger);padding:20px">Ó╣äÓĖĪÓ╣łÓĖ¬ÓĖ▓ÓĖĪÓĖ▓ÓĖŻÓĖ¢ÓĖ¬ÓĖŻÓ╣ēÓĖ▓ÓĖć Barcode Ó╣äÓĖöÓ╣ē</div>';
    }
    document.getElementById('bc-modal').style.display = 'flex';
  }

  function closeAll() {
    document.getElementById('choose-modal').style.display = 'none';
    document.getElementById('qr-modal').style.display = 'none';
    document.getElementById('bc-modal').style.display = 'none';
    document.getElementById('show-cost').checked = false;
    document.getElementById('cost-preview').style.display = 'none';
    document.getElementById('show-p2').checked = false;
    document.getElementById('p2-preview').style.display = 'none';
  }

  // Print QR
  function printQR() {
    const name = document.getElementById('qr-product-name').textContent;
    const barcode = document.getElementById('qr-product-barcode').textContent;
    const price = document.getElementById('qr-product-price').textContent;
    const qrEl = document.querySelector('#qr-canvas canvas') || document.querySelector('#qr-canvas img');
    let imgSrc = '';
    if (qrEl?.tagName === 'CANVAS') imgSrc = qrEl.toDataURL();
    else if (qrEl?.tagName === 'IMG') imgSrc = qrEl.src;

    const win = window.open('', '_blank');
    win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8">
      <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
      <style>
        body{font-family:'Sarabun',sans-serif;margin:0;display:flex;justify-content:center;align-items:center;min-height:100vh;background:#fff}
        .card{text-align:center;padding:24px;border:2px solid #000;border-radius:12px;width:240px}
        .shop{font-size:11px;letter-spacing:2px;color:#666;margin-bottom:8px;text-transform:uppercase}
        img{width:180px;height:180px;display:block;margin:0 auto 12px}
        .pname{font-size:14px;font-weight:700;margin-bottom:4px;line-height:1.4}
        .pcode{font-size:11px;color:#666;font-family:monospace;margin-bottom:8px}
        .pprice{font-size:28px;font-weight:700;color:#e55a2b}
        .punit{font-size:11px;color:#666}
        .pcost{font-size:10pt;font-family:monospace;color:#333;margin-top:1mm;letter-spacing:2px}
        @media print{body{-webkit-print-color-adjust:exact}}
      </style></head><body>
      <div class="card">
        <div class="shop">SRE Wire Shop</div>
        <img src="${imgSrc}">
        <div class="pname">${name}</div>
        <div class="pcode">${barcode}</div>
        <div class="pprice">${price}</div>
        <div class="punit">ÓĖÜÓĖ▓ÓĖŚ / ÓĖ½ÓĖÖÓ╣łÓĖ¦ÓĖó</div>
      </div>
      <script>window.onload=()=>window.print()<\/script>
    </body></html>`);
    win.document.close();
  }

  // Encode cost to KAO cipher
  function encodeCost(num) {
    const map = {'0':'A','1':'K','2':'L','3':'M','4':'N','5':'O','6':'P','7':'Q','8':'R','9':'S'};
    return String(num).split('').map(d => map[d] || d).join('');
  }

  // Print Barcode (custom sticker size)
  function printBarcode() {
    const name = document.getElementById('bc-product-name').textContent;
    const price = document.getElementById('bc-product-price').textContent.replace('ÓĖ┐','').trim();
    const showCost = document.getElementById('show-cost').checked;
    const costEncoded = showCost ? (document.getElementById('cost-preview').value || encodeCost(currentProduct.cost || '')) : '';
    const showP2 = document.getElementById('show-p2').checked;
    const p2Val = showP2 ? ('P2:' + (document.getElementById('p2-preview').value || encodeCost(currentProduct.p2 || '0'))) : '';
    const svg = document.getElementById('bc-svg');
    const svgData = new XMLSerializer().serializeToString(svg);
    const svgBlob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
    const imgUrl = URL.createObjectURL(svgBlob);

    const w = parseInt(document.getElementById('sticker-w').value) || 30;
    const h = parseInt(document.getElementById('sticker-h').value) || 30;
    const costHtml = costEncoded ? '<div class="pcost">' + costEncoded + '</div>' : '';
    const p2Html = p2Val ? '<div class="pp2">' + p2Val + '</div>' : '';
    const bottomRowHtml = (costHtml || p2Html) ? '<div class="bottom-row">' + costHtml + p2Html + '</div>' : '';

    const win = window.open('', '_blank');
    const html = '<!DOCTYPE html><html><head><meta charset="UTF-8">'
      + '<style>'
      + '@page{size:' + w + 'mm ' + h + 'mm;margin:0}'
      + '*{margin:0;padding:0;box-sizing:border-box}'
      + 'body{font-family:Arial,sans-serif;width:' + w + 'mm;height:' + h + 'mm;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#fff;overflow:hidden}'
      + '.pname{font-size:6pt;font-weight:700;text-align:center;line-height:1.2;max-width:' + (w-2) + 'mm;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:1mm}'
      + '.barcode-img{width:' + (w-2) + 'mm;height:auto;display:block}'
      + '.price-wrap{width:' + (w-2) + 'mm;margin-top:1mm;display:flex;flex-direction:column;align-items:center}'
      + '.pprice{font-size:8pt;font-weight:700;text-align:center}'
      + '.pcost{font-size:6pt;font-family:monospace;color:#333;letter-spacing:1px}'
      + '.pp2{font-size:6pt;font-family:monospace;color:#333;letter-spacing:1px}'
      + '.bottom-row{width:' + (w-2) + 'mm;display:flex;justify-content:space-between;align-items:center;margin-top:1mm}'
      + '@media print{body{-webkit-print-color-adjust:exact}}'
      + '</style></head><body>'
      + '<div class="pname">' + name + '</div>'
      + '<img class="barcode-img" src="' + imgUrl + '">'
      + '<div class="price-wrap"><div class="pprice">ÓĖŻÓĖ▓ÓĖäÓĖ▓' + price + ' ÓĖÜÓĖ▓ÓĖŚ</div></div>' + bottomRowHtml
      + '<script>window.onload=function(){window.print()}<\/script>'
      + '</body></html>';
    win.document.write(html);
    win.document.close();
  }

  // Event listeners
  document.getElementById('login-btn').addEventListener('click', doLogin);
  document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));
  document.getElementById('search-input').addEventListener('input', doSearch);
  document.getElementById('email').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

  // Choose modal
  document.getElementById('choose-close').addEventListener('click', closeAll);
  document.getElementById('choose-qr').addEventListener('click', showQR);
  document.getElementById('choose-bc').addEventListener('click', showBarcode);
  document.getElementById('choose-modal').addEventListener('click', e => { if (e.target === document.getElementById('choose-modal')) closeAll(); });

  // QR modal
  document.getElementById('qr-close').addEventListener('click', closeAll);
  document.getElementById('qr-back-btn').addEventListener('click', () => {
    document.getElementById('qr-modal').style.display = 'none';
    document.getElementById('choose-modal').style.display = 'flex';
  });
  document.getElementById('qr-print-btn').addEventListener('click', printQR);
  document.getElementById('qr-modal').addEventListener('click', e => { if (e.target === document.getElementById('qr-modal')) closeAll(); });

  // Barcode modal
  document.getElementById('show-p2').addEventListener('change', function() {
    const preview = document.getElementById('p2-preview');
    if (this.checked && currentProduct) {
      preview.value = encodeCost(currentProduct.p2 || '0');
      preview.style.display = 'block';
    } else {
      preview.style.display = 'none';
    }
  });

  document.getElementById('show-cost').addEventListener('change', function() {
    const preview = document.getElementById('cost-preview');
    if (this.checked && currentProduct) {
      preview.value = encodeCost(currentProduct.cost || '0');
      preview.style.display = 'block';
    } else {
      preview.style.display = 'none';
    }
  });

  document.getElementById('bc-close').addEventListener('click', closeAll);
  document.getElementById('bc-back-btn').addEventListener('click', () => {
    document.getElementById('bc-modal').style.display = 'none';
    document.getElementById('choose-modal').style.display = 'flex';
  });
  document.getElementById('bc-print-btn').addEventListener('click', printBarcode);
  document.getElementById('bc-modal').addEventListener('click', e => { if (e.target === document.getElementById('bc-modal')) closeAll(); });
</script>
</body>
</html>
